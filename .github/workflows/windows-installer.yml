name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller reportlab pypdf

      - name: Build app bundle
        run: build_windows.bat

      - name: Build setup exe
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer_windows.iss

      - name: Zip setup exe
        run: |
          powershell -NoProfile -Command "if (Test-Path 'installer-dist/KarpuzVetPatoloji-Windows.zip') { Remove-Item 'installer-dist/KarpuzVetPatoloji-Windows.zip' -Force }; Compress-Archive -Path 'installer-dist/setup.exe' -DestinationPath 'installer-dist/KarpuzVetPatoloji-Windows.zip' -Force"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: KarpuzVetPatoloji-Windows-Setup
          path: |
            installer-dist/setup.exe
            installer-dist/KarpuzVetPatoloji-Windows.zip
